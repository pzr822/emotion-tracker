<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>心情晴雨表</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
<h1>靓靓冉冉宝贝的心情晴雨表</h1>

<div class="tabs">

<button class="tab-btn" data-tab="supplement">补给</button>
</div>

<div id="mood" class="tab active">
<form>

</form>
</div>

<div id="supplement" class="tab">
<div id="todayList">加载中...</div>
<form id="supplementForm">
<label><input type="checkbox" value="鱼油">鱼油</label>
<label><input type="checkbox" value="镁">镁</label>
<label><input type="checkbox" value="多种维生素">多种维生素</label>

</form>
</div>

</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
</body>
</html>
